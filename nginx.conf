server {
    listen 80;
    server_name localhost;

    # Otimizacoes de compressao
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Headers de Seguranca Global
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Diretorio dos arquivos estaticos (Frontend Vite)
    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files /index.html =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Uploads gerados pela API (logo, favicon, produtos etc.)
    location /uploads/ {
        proxy_pass http://pizzaria_api:3000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # Rotas do Frontend (SPA fallback)
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Proxy Reverso para a API Backend Node.js
    location /api/ {
        # 'api' e o nome do servico no docker-compose.yml
        proxy_pass http://pizzaria_api:3000/api/;
        
        # Headers importantes para encaminhamento seguro
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Suporte para uploads maiores (ex: imagens base64 de produtos)
        client_max_body_size 10M;
    }
}
